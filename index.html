<!DOCTYPE html>
<html>
<head>
    <title>School Time Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            text-align: center;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background-color: rgb(152, 219, 243);
        }
    </style>
</head>
<body>

<h2 align="center">School Time Table</h2>

<table>
    <tr>
        <th>Day / Time</th>
        <th>9:00-10:00</th>
        <th>10:00-11:00</th>
        <th>11:00-12:00</th>
        <th>12:00-1:00</th>
        <th>2:00-3:00</th>
    </tr>

    <tr>
        <th>Monday</th>
        <td>Tamil</td>
        <td>English</td>
        <td>Maths</td>
        <td rowspan="5">Lunch</td>
        <td>Science</td>
    </tr>

    <tr>
        <th>Tuesday</th>
        <td>Maths</td>
        <td>Science</td>
        <td>Social</td>
        <td>English</td>
    </tr>

    <tr>
        <th>Wednesday</th>
        <td>English</td>
        <td>Tamil</td>
        <td>Maths</td>
        <td>PT</td>
    </tr>

    <tr>
        <th>Thursday</th>
        <td>Science</td>
        <td>Social</td>
        <td>English</td>
        <td>Maths</td>
    </tr>

    <tr>
        <th>Friday</th>
        <td>Tamil</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Drawing</td>
    </tr>

</table>

</body>
</html>
